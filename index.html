<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epic Digital Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #f1f5f9;
      line-height: 1.6;
      background: #020617;
    }

    /* Main Background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(rgba(2, 6, 23, 0.84), rgba(2, 6, 23, 0.9)), url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.25), transparent 30%), radial-gradient(circle at 80% 40%, rgba(168, 85, 247, 0.22), transparent 30%), radial-gradient(circle at 50% 90%, rgba(14, 165, 233, 0.16), transparent 35%);
      pointer-events: none;
    }

    /* Hero */
    .hero-showcase-bg {
      position: relative;
      color: white;
      padding: 80px 20px 90px;
      text-align: center;
      overflow: hidden;
      border-bottom: 1px solid rgba(59, 130, 246, 0.25);
      background: linear-gradient(135deg, rgba(2, 6, 23, 0.65), rgba(30, 58, 138, 0.35));
    }

    .hero-showcase-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.18), transparent 28%), radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.18), transparent 30%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-showcase-bg h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      margin: 0 0 14px;
      letter-spacing: -1.5px;
      text-shadow: 0 0 24px rgba(59, 130, 246, 0.35);
    }

    .hero-showcase-bg p.subtitle {
      font-size: clamp(17px, 2.5vw, 22px);
      color: #bfdbfe;
      margin: 0 auto 34px;
      font-weight: 500;
      max-width: 760px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      padding: 15px 30px;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      transition: all 0.25s ease;
      box-shadow: 0 0 16px rgba(37, 99, 235, 0.45), 0 8px 24px rgba(0, 0, 0, 0.35);
      margin-bottom: 55px;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 22px rgba(56, 189, 248, 0.7), 0 12px 30px rgba(0, 0, 0, 0.45);
    }

    .showcase-container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 10px;
    }

    .showcase-img {
      max-width: 100%;
      height: auto;
      border-radius: 18px;
      display: block;
      margin: 0 auto;
      border: 1px solid rgba(96, 165, 250, 0.35);
      box-shadow: 0 0 24px rgba(56, 189, 248, 0.25), 0 24px 55px rgba(0, 0, 0, 0.7);
    }

    /* General Section */
    section { padding: 85px 20px; }
    .section-inner { max-width: 1100px; margin: 0 auto; }

    h2 {
      text-align: center;
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 44px;
      position: relative;
      letter-spacing: -0.7px;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #2563eb, #22d3ee);
      margin: 12px auto 0;
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.65);
    }

    /* Starter Packages Background */
    .packages-section {
      position: relative;
      max-width: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(rgba(4, 10, 24, 0.77), rgba(4, 10, 24, 0.88)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1800&auto=format&fit=crop') center/cover no-repeat;
      border-top: 1px solid rgba(59, 130, 246, 0.2);
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
    }

    .packages-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 42%, rgba(0, 183, 255, 0.28), transparent 32%), radial-gradient(circle at 80% 35%, rgba(168, 85, 247, 0.25), transparent 30%), radial-gradient(circle at 50% 90%, rgba(37, 99, 235, 0.20), transparent 34%);
      pointer-events: none;
    }

    .packages-section::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(59, 130, 246, 0.10) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.10) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0.22;
      pointer-events: none;
    }

    .packages-section .section-inner { position: relative; z-index: 2; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 26px;
    }

    /* Card Setup with Hidden Details Layer */
    .card {
      position: relative;
      background: rgba(8, 15, 35, 0.84);
      padding: 32px 22px;
      border-radius: 24px;
      min-height: 245px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(12px);
      border: 2px solid rgba(56, 189, 248, 0.62);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.45), 0 0 28px rgba(37, 99, 235, 0.25), inset 0 0 12px rgba(59, 130, 246, 0.16);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; /* Clips the sliding text panel inside the card boundary */
    }

    .card:hover {
      transform: translateY(-7px) scale(1.02);
      border-color: #67e8f9;
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.72), 0 0 42px rgba(37, 99, 235, 0.4), 0 0 58px rgba(168, 85, 247, 0.22);
    }

    .card-main-content {
      transition: transform 0.3s ease;
    }

    /* Smoothly pull up main elements slightly on hover */
    .card:hover .card-main-content {
      transform: translateY(-10px);
    }

    .card h3 {
      margin: 0 0 10px;
      color: #ffffff;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card p {
      color: #cbd5e1;
      font-size: 14px;
      margin: 5px 0;
    }

    .price-badge {
      display: inline-block;
      color: #67e8f9;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px !important;
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.45);
    }

    /* Slide-Up Tech Detail Panel Styling */
    .card-hover-details {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(4, 12, 32, 0.96) 0%, rgba(8, 25, 62, 0.98) 100%);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform: translateY(100%); /* Keeps it out of view at the bottom */
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 3;
    }

    .card:hover .card-hover-details {
      transform: translateY(0); /* Slides panel up into full view on hover */
    }

    .card-hover-details h4 {
      margin: 0 0 12px 0;
      color: #67e8f9;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-hover-details ul {
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: left;
      width: 100%;
    }

    .card-hover-details li {
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 8px;
      padding-left: 18px;
      position: relative;
    }

    /* Small neon cyan bullet dash */
    .card-hover-details li::before {
      content: "▪";
      position: absolute;
      left: 0;
      color: #06b6d4;
      font-size: 10px;
      top: -1px;
    }

    .small-note {
      margin-top: 28px;
      text-align: center;
      color: #bfdbfe;
      font-size: 14px;
    }

    /* Why Section */
    .why-section {
      position: relative;
      background: linear-gradient(rgba(2, 6, 2
